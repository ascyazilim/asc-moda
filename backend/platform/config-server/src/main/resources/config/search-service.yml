server:
  port: ${SEARCH_SERVICE_PORT:0}

ascmoda:
  security:
    service-client:
      registration-id: ascmoda-service
  search:
    config-source: config-server
    index:
      products: ${SEARCH_PRODUCTS_INDEX:ascmoda-products}

spring:
  application:
    name: search-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/asc-moda}"
  datasource:
    url: "${SEARCH_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_search}"
    username: ${SEARCH_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${SEARCH_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  elasticsearch:
    uris: "${ELASTICSEARCH_URIS:http://localhost:9200}"
    connection-timeout: ${ELASTICSEARCH_CONNECT_TIMEOUT:2s}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:5s}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:asc_moda}
    password: ${RABBITMQ_PASSWORD:asc_moda}
    listener:
      simple:
        default-requeue-rejected: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.search: INFO

info:
  ascmoda:
    search:
      config-source: ${ascmoda.search.config-source}
      product-index: ${ascmoda.search.index.products}
