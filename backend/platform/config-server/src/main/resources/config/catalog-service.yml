server:
  port: ${CATALOG_SERVICE_PORT:0}

ascmoda:
  security:
    service-client:
      registration-id: ascmoda-service
  catalog:
    config-source: config-server
    outbox:
      enabled: ${CATALOG_OUTBOX_ENABLED:true}
      batch-size: ${CATALOG_OUTBOX_BATCH_SIZE:25}
      max-retries: ${CATALOG_OUTBOX_MAX_RETRIES:5}
      publish-delay-ms: ${CATALOG_OUTBOX_PUBLISH_DELAY_MS:5000}

spring:
  application:
    name: catalog-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/asc-moda}"
  datasource:
    url: "${CATALOG_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_catalog}"
    username: ${CATALOG_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${CATALOG_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:asc_moda}
    password: ${RABBITMQ_PASSWORD:asc_moda}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.catalog: INFO

info:
  ascmoda:
    catalog:
      config-source: ${ascmoda.catalog.config-source}
