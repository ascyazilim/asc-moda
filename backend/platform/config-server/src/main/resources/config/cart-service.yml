server:
  port: ${CART_SERVICE_PORT:0}

ascmoda:
  security:
    service-client:
      registration-id: ascmoda-service
  cart:
    config-source: config-server

spring:
  application:
    name: cart-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/asc-moda}"
      client:
        provider:
          keycloak:
            token-uri: "${KEYCLOAK_TOKEN_URI:http://localhost:8081/realms/asc-moda/protocol/openid-connect/token}"
        registration:
          ascmoda-service:
            provider: keycloak
            authorization-grant-type: client_credentials
            client-id: ${CART_SERVICE_OAUTH2_CLIENT_ID:cart-service}
            client-secret: ${CART_SERVICE_OAUTH2_CLIENT_SECRET:cart-service-secret}
  cloud:
    openfeign:
      client:
        config:
          catalog-service:
            connectTimeout: 2000
            readTimeout: 3000
          inventory-service:
            connectTimeout: 2000
            readTimeout: 3000
  datasource:
    url: "${CART_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_cart}"
    username: ${CART_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${CART_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.cart: INFO

info:
  ascmoda:
    cart:
      config-source: ${ascmoda.cart.config-source}
