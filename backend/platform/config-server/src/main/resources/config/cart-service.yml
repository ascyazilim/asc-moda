server:
  port: ${CART_SERVICE_PORT:0}

ascmoda:
  cart:
    config-source: config-server

spring:
  application:
    name: cart-service
  cloud:
    openfeign:
      client:
        config:
          catalog-service:
            connectTimeout: 2000
            readTimeout: 3000
          inventory-service:
            connectTimeout: 2000
            readTimeout: 3000
  datasource:
    url: "${CART_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_cart}"
    username: ${CART_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${CART_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.cart: INFO

info:
  ascmoda:
    cart:
      config-source: ${ascmoda.cart.config-source}
