server:
  port: ${ORDER_SERVICE_PORT:0}

ascmoda:
  order:
    config-source: config-server
    reservation-ttl-minutes: ${ORDER_RESERVATION_TTL_MINUTES:30}

spring:
  application:
    name: order-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          cart-service:
            connectTimeout: 2000
            readTimeout: 3000
          inventory-service:
            connectTimeout: 2000
            readTimeout: 3000
  datasource:
    url: "${ORDER_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_order}"
    username: ${ORDER_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${ORDER_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.order: INFO

resilience4j:
  circuitbreaker:
    instances:
      cart-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      inventory-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

info:
  ascmoda:
    order:
      config-source: ${ascmoda.order.config-source}
