server:
  port: ${ORDER_SERVICE_PORT:0}

ascmoda:
  security:
    service-client:
      registration-id: ascmoda-service
  order:
    config-source: config-server
    reservation-ttl-minutes: ${ORDER_RESERVATION_TTL_MINUTES:30}
    outbox:
      enabled: ${ORDER_OUTBOX_ENABLED:true}
      batch-size: ${ORDER_OUTBOX_BATCH_SIZE:25}
      max-retries: ${ORDER_OUTBOX_MAX_RETRIES:5}
      publish-delay-ms: ${ORDER_OUTBOX_PUBLISH_DELAY_MS:5000}

spring:
  application:
    name: order-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/asc-moda}"
      client:
        provider:
          keycloak:
            token-uri: "${KEYCLOAK_TOKEN_URI:http://localhost:8081/realms/asc-moda/protocol/openid-connect/token}"
        registration:
          ascmoda-service:
            provider: keycloak
            authorization-grant-type: client_credentials
            client-id: ${ORDER_SERVICE_OAUTH2_CLIENT_ID:order-service}
            client-secret: ${ORDER_SERVICE_OAUTH2_CLIENT_SECRET:order-service-secret}
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          cart-service:
            connectTimeout: 2000
            readTimeout: 3000
          inventory-service:
            connectTimeout: 2000
            readTimeout: 3000
  datasource:
    url: "${ORDER_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_order}"
    username: ${ORDER_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${ORDER_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:asc_moda}
    password: ${RABBITMQ_PASSWORD:asc_moda}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.order: INFO

resilience4j:
  circuitbreaker:
    instances:
      cart-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
      inventory-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
  timelimiter:
    instances:
      cart-service:
        timeout-duration: 4s
      inventory-service:
        timeout-duration: 4s

info:
  ascmoda:
    order:
      config-source: ${ascmoda.order.config-source}
