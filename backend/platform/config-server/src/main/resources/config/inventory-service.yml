server:
  port: ${INVENTORY_SERVICE_PORT:0}

ascmoda:
  inventory:
    config-source: config-server
    outbox:
      enabled: ${INVENTORY_OUTBOX_ENABLED:true}
      batch-size: ${INVENTORY_OUTBOX_BATCH_SIZE:25}
      max-retries: ${INVENTORY_OUTBOX_MAX_RETRIES:5}
      publish-delay-ms: ${INVENTORY_OUTBOX_PUBLISH_DELAY_MS:5000}

spring:
  application:
    name: inventory-service
  cloud:
    openfeign:
      client:
        config:
          catalog-service:
            connectTimeout: 2000
            readTimeout: 3000
  datasource:
    url: "${INVENTORY_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_inventory}"
    username: ${INVENTORY_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${INVENTORY_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:asc_moda}
    password: ${RABBITMQ_PASSWORD:asc_moda}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.inventory: INFO

info:
  ascmoda:
    inventory:
      config-source: ${ascmoda.inventory.config-source}
