server:
  port: ${CUSTOMER_SERVICE_PORT:0}

ascmoda:
  security:
    service-client:
      registration-id: ascmoda-service
  customer:
    config-source: config-server

spring:
  application:
    name: customer-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/asc-moda}"
  datasource:
    url: "${CUSTOMER_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_customer}"
    username: ${CUSTOMER_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${CUSTOMER_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.customer: INFO

info:
  ascmoda:
    customer:
      config-source: ${ascmoda.customer.config-source}
