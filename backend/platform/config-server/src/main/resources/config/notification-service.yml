server:
  port: ${NOTIFICATION_SERVICE_PORT:0}

ascmoda:
  security:
    service-client:
      registration-id: ascmoda-service
  notification:
    config-source: config-server
    sender:
      log:
        enabled: ${NOTIFICATION_LOG_SENDER_ENABLED:true}
    recipient:
      ops: ${NOTIFICATION_OPS_RECIPIENT:ops@ascmoda.local}
    retry:
      max-attempts: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:3}

spring:
  application:
    name: notification-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: "${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/asc-moda}"
  datasource:
    url: "${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_notification}"
    username: ${NOTIFICATION_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${NOTIFICATION_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:asc_moda}
    password: ${RABBITMQ_PASSWORD:asc_moda}
    listener:
      simple:
        default-requeue-rejected: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.notification: INFO

info:
  ascmoda:
    notification:
      config-source: ${ascmoda.notification.config-source}
