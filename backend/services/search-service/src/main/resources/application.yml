server:
  port: ${SEARCH_SERVICE_PORT:0}

spring:
  application:
    name: search-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  elasticsearch:
    uris: "${ELASTICSEARCH_URIS:http://localhost:9200}"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:asc_moda}
    password: ${RABBITMQ_PASSWORD:asc_moda}

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
