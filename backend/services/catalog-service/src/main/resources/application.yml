server:
  port: ${CATALOG_SERVICE_PORT:0}

spring:
  application:
    name: catalog-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  datasource:
    url: "${CATALOG_DB_URL:jdbc:postgresql://localhost:15432/asc_moda_catalog}"
    username: ${CATALOG_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${CATALOG_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.ascmoda.catalog: INFO
