server:
  port: ${CUSTOMER_SERVICE_PORT:0}

spring:
  application:
    name: customer-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  datasource:
    url: "${CUSTOMER_DB_URL:jdbc:postgresql://localhost:5432/asc_moda_customer}"
    username: ${CUSTOMER_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${CUSTOMER_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
