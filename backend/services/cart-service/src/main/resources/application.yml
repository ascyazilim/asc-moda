server:
  port: ${CART_SERVICE_PORT:0}

spring:
  application:
    name: cart-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  datasource:
    url: "${CART_DB_URL:jdbc:postgresql://localhost:5432/asc_moda_cart}"
    username: ${CART_DB_USERNAME:${POSTGRES_USER:asc_moda}}
    password: ${CART_DB_PASSWORD:${POSTGRES_PASSWORD:asc_moda}}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
